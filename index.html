<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barbell Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cyber: {
              bg: '#0a0e17',
              panel: '#111827',
              border: '#00f5ff',
              pink: '#ff00aa',
              purple: '#7c3aed',
            }
          },
          fontFamily: {
            cyber: ['Orbitron', 'Rajdhani', 'sans-serif'],
            mono: ['Share Tech Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-cyber-bg grid-background text-gray-100 font-cyber antialiased">
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <main class="relative z-10 max-w-4xl mx-auto px-4 pt-8 pb-10 sm:pt-12 sm:pb-14">
    <header class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-wider">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-fuchsia-500 to-purple-500 glitch-title">
          BARBELL CALCULATOR
        </span>
      </h1>
    </header>

    <section class="cyber-panel rounded-lg p-6 sm:p-8 mb-8">
      <div class="grid gap-6 sm:grid-cols-2">
        <div>
          <label class="block text-cyan-400/90 text-sm font-mono tracking-widest uppercase mb-3">
            Гриф
          </label>
          <div class="flex gap-3" role="group" aria-label="Выбор грифа">
            <button type="button" id="bar-18" class="bar-btn flex-1 py-3 px-4 rounded border-2 font-semibold transition-all" data-kg="18">
              18 <span class="text-cyan-400/70 text-sm">кг</span>
            </button>
            <button type="button" id="bar-20" class="bar-btn flex-1 py-3 px-4 rounded border-2 font-semibold transition-all" data-kg="20">
              20 <span class="text-cyan-400/70 text-sm">кг</span>
            </button>
          </div>
        </div>

        <div>
          <label for="target-weight" class="block text-cyan-400/90 text-sm font-mono tracking-widest uppercase mb-3">
            Целевой вес (кг)
          </label>
          <div class="relative">
            <input
              type="number"
              id="target-weight"
              min="0"
              step="0.5"
              placeholder="140"
              class="cyber-input w-full py-3 px-4 pr-12 rounded font-mono text-xl"
            />
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-fuchsia-400/80 font-mono text-sm">KG</span>
          </div>
        </div>
      </div>

      <div class="mt-6">
        <label class="block text-cyan-400/90 text-sm font-mono tracking-widest uppercase mb-3">
          Доступные блины (lbs)
        </label>
        <div id="plates-inventory" class="grid grid-cols-3 sm:grid-cols-6 gap-2">
          <button type="button" class="bar-btn inventory-plate-btn py-2 px-3 rounded border-2 font-semibold text-center transition-all" data-lbs="45">45</button>
          <button type="button" class="bar-btn inventory-plate-btn py-2 px-3 rounded border-2 font-semibold text-center transition-all" data-lbs="35">35</button>
          <button type="button" class="bar-btn inventory-plate-btn py-2 px-3 rounded border-2 font-semibold text-center transition-all" data-lbs="25">25</button>
          <button type="button" class="bar-btn inventory-plate-btn py-2 px-3 rounded border-2 font-semibold text-center transition-all" data-lbs="10">10</button>
          <button type="button" class="bar-btn inventory-plate-btn py-2 px-3 rounded border-2 font-semibold text-center transition-all" data-lbs="5">5</button>
          <button type="button" class="bar-btn inventory-plate-btn py-2 px-3 rounded border-2 font-semibold text-center transition-all" data-lbs="2.5">2.5</button>
        </div>
      </div>

      <button type="button" id="calculate-btn" class="cyber-btn w-full mt-6 py-4 rounded font-bold tracking-widest uppercase text-sm sm:text-base text-center">
        РАССЧИТАТЬ
      </button>
    </section>

    <section id="results" class="hidden results-section">
      <article id="variant-under" class="variant-card variant-card--under cyber-panel">
        <h2 id="under-title" class="variant-title variant-title--under"></h2>
        <div id="barbell-viz-under" class="barbell-container visual-container"></div>
        <ul id="plate-list-under" class="variant-plate-list"></ul>
      </article>

      <article id="variant-over" class="variant-card variant-card--over cyber-panel">
        <h2 id="over-title" class="variant-title variant-title--over"></h2>
        <div id="barbell-viz-over" class="barbell-container visual-container"></div>
        <ul id="plate-list-over" class="variant-plate-list"></ul>
        <p id="over-warning" class="variant-warning hidden"></p>
      </article>
    </section>

    <p id="error-msg" class="hidden text-center text-red-400 font-mono py-4 border border-red-500/50 rounded bg-red-950/30"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
